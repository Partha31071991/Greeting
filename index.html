<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Premium Postcard Creator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=EB+Garamond:wght@600&display=swap" rel="stylesheet">

<style>
body{margin:0;background:#efe3cf;font-family:'EB Garamond',serif;}
.wrapper{display:flex;flex-wrap:wrap;gap:14px;padding:14px;}
.controls{flex:1 1 320px;background:#fff;padding:14px;border-radius:12px;}
.controls input,.controls textarea,.controls select,button{width:100%;padding:10px;margin:6px 0;}
.preview{flex:1 1 420px;display:flex;justify-content:center;}

.postcard{
  width:14cm;height:9cm;
  background:url("postcard-bg.jpeg") center/cover no-repeat;
  position:relative;padding:12px;
}

.headline{width:48%;text-align:center;color:#6f1c1c;}
.wish{width:48%;line-height:1.5;}

/* PHOTO */
.photo-box{
  position:absolute;
  left:48%;
  top:10px;
  width:130px;
  height:160px;
}
.photo-box img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:6px;
  opacity:0.8;
  mix-blend-mode:multiply;
}

/* NAME + DETAILS */
.name-right{
  position:absolute;
  left:48%;
  top:180px;
  font-weight:900;
  font-size:22px;
}
.sub-info{
  position:absolute;
  left:48%;
  top:210px;
  font-size:13px;
  color:#333;
}

/* SENDER */
.sender{
  position:absolute;
  bottom:10px;
  left:10px;
  font-size:13px;
}

/* BRAND */
.brand-reminders{
  position:absolute;
  bottom:5px;
  right:90px;
  display:flex;
  gap:8px;
}
.brand-reminders img{width:110px;}

.logo{
  position:absolute;
  bottom:2px;
  right:5px;
  width:70px;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="controls">

<h3>Upload Photo</h3>
<input type="file" accept="image/*" onchange="loadPhoto(event)">
<input type="range" min="100" max="180" value="130" oninput="resizePhoto(this.value)">

<h3>Recipient</h3>
<input id="recipientName" placeholder="Recipient Name" oninput="renderAll()">

<!-- NEW FIELD -->
<input id="recipientDetail" placeholder="Place / Hospital / Speciality" oninput="renderAll()">

<h3>Headline</h3>
<select id="headlineTemplate" onchange="applyHeadlineTemplate()">
  <option value="diabetology" selected>Diabetology Theme</option>
  <option value="fy">FY26-27</option>
</select>

<input id="headlineText" value="Your Vision, Our Support: The Diabetology Milestone" oninput="renderAll()">
<input type="range" min="26" max="46" value="26" id="headlineSize" oninput="renderAll()">

<h3>Wish</h3>
<select id="wishTemplate" onchange="applyTemplate()">
  <option value="launch" selected>Launch</option>
  <option value="fy">FY26-27</option>
</select>

<input type="range" min="14" max="20" value="14" id="wishSize" oninput="renderAll()">

<textarea id="wishText" rows="6" oninput="renderAll()">
Dear Doctor,
As you continue to transform lives through expert diabetic care, Alkem is proud to introduce our dedicated Diabetology Division. Together, let's strive for better outcomes and clinical excellence.
Your Partner in Every Glycemic Victor
</textarea>

<h3>Brand Reminder</h3>
<label><input type="checkbox" value="empanorm" onchange="updateBrands()"> Empanorm LM</label><br>
<label><input type="checkbox" value="glucoryl" onchange="updateBrands()"> Glucoryl MV</label><br>
<label><input type="checkbox" value="rosukem" onchange="updateBrands()"> Rosukem</label>

<h3>Sender</h3>
<input id="senderName" placeholder="Name" oninput="renderSender()">
<input id="senderPlace" placeholder="Place" oninput="renderSender()">
<input id="senderPhone" placeholder="Phone" oninput="renderSender()">

<h3>Download</h3>
<button onclick="downloadJPG()">JPG</button>
<button onclick="downloadPDF()">PDF</button>

</div>

<div class="preview">
<div class="postcard" id="card">

<div class="headline" id="headline"></div>
<div class="wish" id="wishPreview"></div>

<div class="photo-box" id="photoBox">
  <img id="photo">
</div>

<div class="name-right" id="rightName"></div>
<div class="sub-info" id="rightDetail"></div>

<div class="brand-reminders" id="brandBox"></div>
<div class="sender" id="senderBlock"></div>

<img src="company-logo.png" class="logo">

</div>
</div>

</div>

<script>
const { jsPDF } = window.jspdf;

/* PHOTO */
function loadPhoto(e){
  photo.src = URL.createObjectURL(e.target.files[0]);
}
function resizePhoto(size){
  photoBox.style.width=size+"px";
  photoBox.style.height=(size*1.2)+"px";
}

/* HEADLINE */
function applyHeadlineTemplate(){
  if(headlineTemplate.value==="diabetology"){
    headlineText.value="Your Vision, Our Support: The Diabetology Milestone";
  }
  if(headlineTemplate.value==="fy"){
    headlineText.value="A Legacy of Excellence, A Future of Precision";
  }
  renderAll();
}

/* WISH */
function applyTemplate(){
  if(wishTemplate.value==="launch"){
    wishText.value=`Dear Doctor,
As you continue to transform lives through expert diabetic care, Alkem is proud to introduce our dedicated Diabetology Division. Together, let's strive for better outcomes and clinical excellence.
Your Partner in Every Glycemic Victor`;
  }

  if(wishTemplate.value==="fy"){
    wishText.value=`Dear Sir/Ma'am,
As we embark on a new financial year, we extend our deepest gratitude for your continued trust. With Diabetology Division, we look forward to scaling new heights of growth and service together.
Here’s to a year of seamless collaboration and shared victories.
Your Partner in Every Glycemic Victory.`;
  }

  renderAll();
}

/* RENDER */
function renderAll(){
  rightName.innerText = recipientName.value.toUpperCase();
  rightDetail.innerText = recipientDetail.value;

  let formattedHeadline = headlineText.value.replace(
    "Diabetology",
    "<span style='color:#007BFF;font-weight:bold;font-size:1.2em;'>Diabetology</span>"
  );

  headline.style.fontSize=headlineSize.value+"px";
  headline.innerHTML=formattedHeadline;

  let text=wishText.value;

  text=text.replace("Diabetology","<b>Diabetology</b>");
  text=text.replace("Your Partner in Every Glycemic Victor","<b>Your Partner in Every Glycemic Victor</b>");
  text=text.replace("Your Partner in Every Glycemic Victory.","<b>Your Partner in Every Glycemic Victory.</b>");

  wishPreview.style.fontSize=wishSize.value+"px";
  wishPreview.innerHTML=text.replace(/\n/g,"<br>");
}

/* BRAND */
function updateBrands(){
  brandBox.innerHTML="";
  document.querySelectorAll("input[type=checkbox]:checked").forEach(b=>{
    let img=document.createElement("img");
    img.src=b.value==="empanorm"?"empanorm-lm.png":
            b.value==="glucoryl"?"glucoryl-mv.png":"rosukem.png";
    brandBox.appendChild(img);
  });
}

/* SENDER */
function renderSender(){
  senderBlock.innerText=`Regards,
${senderName.value}
${senderPlace.value} | ${senderPhone.value}`;
}

/* DOWNLOAD */
function downloadJPG(){
  html2canvas(card,{scale:2}).then(c=>{
    let a=document.createElement("a");
    a.href=c.toDataURL();
    a.download="Postcard.jpg";
    a.click();
  });
}

function downloadPDF(){
  html2canvas(card,{scale:2}).then(c=>{
    let pdf=new jsPDF("landscape","mm",[140,90]);
    pdf.addImage(c.toDataURL(),"JPEG",0,0,140,90);
    pdf.save("Postcard.pdf");
  });
}

applyTemplate();
renderAll();
</script>

</body>
</html>
